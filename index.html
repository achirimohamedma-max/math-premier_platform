<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>رِياضياتُنا السّحرية</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f9ff;
      color: #333;
      text-align: right;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 20px 0;
      background: linear-gradient(135deg, #4a90e2, #5bc0de);
      color: white;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    header h1 {
      margin: 0;
      font-size: 2rem;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }
    header p {
      margin: 5px 0 0;
      font-size: 1.1rem;
      opacity: 0.95;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      padding: 24px;
    }
    .welcome {
      text-align: center;
      margin-bottom: 24px;
    }
    .welcome p {
      font-size: 1.1rem;
      color: #555;
      line-height: 1.6;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 12px 0;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      font-weight: bold;
      transition: all 0.2s ease;
    }
    .btn-primary {
      background-color: #4a90e2;
      color: white;
    }
    .btn-primary:hover {
      background-color: #3a7bc8;
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }
    .btn-outline {
      background-color: transparent;
      border: 2px solid #4a90e2;
      color: #4a90e2;
    }
    .btn-outline:hover {
      background-color: #e6f4ff;
    }
    footer {
      margin-top: 36px;
      text-align: center;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>
<body>
  <header>
    <h1>رِياضياتُنا السّحرية</h1>
    <p>تعلّمْ وتلاعبْ… وتصبحُ بطلَ الحساب!</p>
  </header>

  <div class="container">
    <div class="welcome">
      <h2>مرحباً بك في رِياضياتُنا السّحرية</h2>
      <p>
        منصة تفاعلية لتعلّم الرياضيات للصفوف من الأول إلى السادس،  
        بأسلوب تشبه لعبة الأرقام التي تُحبّ!  
      </p>
    </div>

    <a href="student-dashboard.html" class="btn btn-primary">أبدأ رحلتي</a>
    <a href="parent-dashboard.html" class="btn btn-outline">حساب أولياء الأمور</a>
  </div>

  <footer>
    &copy; 2026 رِياضياتُنا السّحرية – منصة تربوية تفاعلية
  </footer>
</body>
</html>
